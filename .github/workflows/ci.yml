name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: false

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Unit & Integration tests with coverage
        run: npx vitest run --coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build verification
        run: npm run build
        env:
          CI: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: dist/
          retention-days: 3

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        env:
          CI: true

      - name: Build application
        run: npm run build
        env:
          CI: true

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: quality
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Check coverage thresholds
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage report found, checking thresholds..."
            LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
            STATEMENTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
            
            echo "Lines: $LINES% (target: 85%)"
            echo "Branches: $BRANCHES% (target: 80%)"
            echo "Functions: $FUNCTIONS% (target: 85%)"
            echo "Statements: $STATEMENTS% (target: 85%)"
            
            FAIL=0
            if (( $(echo "$LINES < 85" | bc -l) )); then echo "FAIL: Lines coverage below 85%"; FAIL=1; fi
            if (( $(echo "$BRANCHES < 80" | bc -l) )); then echo "FAIL: Branches coverage below 80%"; FAIL=1; fi
            if (( $(echo "$FUNCTIONS < 85" | bc -l) )); then echo "FAIL: Functions coverage below 85%"; FAIL=1; fi
            if (( $(echo "$STATEMENTS < 85" | bc -l) )); then echo "FAIL: Statements coverage below 85%"; FAIL=1; fi
            
            if [ $FAIL -eq 1 ]; then exit 1; fi
            echo "All coverage thresholds met!"
          else
            echo "No coverage summary found, skipping threshold check"
          fi
        shell: bash